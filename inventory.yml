---
all:
  vars:
    ansible_user: root
    ansible_password: "{{ router_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  children:
    configured:
      hosts:
        router:
          ansible_host: 172.31.10.1
    factory:
      hosts:
        router_factory:
          ansible_host: 192.168.1.1
